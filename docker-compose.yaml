version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant_db_threat_intel
    command: ["./qdrant", "--config-path", "/config/config.yaml"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
      - ./qdrant_config/config.yaml:/config/config.yaml:ro
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10